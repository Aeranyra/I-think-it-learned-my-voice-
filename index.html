<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I think it learned my voice</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="music" loop></audio>

<!-- TITLE SCREEN -->
<div id="titleScreen" class="screen">
    <h1>I think it learned my voice</h1>

    <input id="nameInput" type="text" placeholder="Enter your name">

    <p id="nameError" style="color:red; display:none;">
        Invalid entry. Access denied.
    </p>

    <div id="glitchMessage"></div>

    <button onclick="startGame()">START</button>
</div>

<!-- PROLOGUE -->
<div id="prologue" class="screen hidden">
    <div class="dialogue-container">

        <img id="scoryImage" src="https://files.catbox.moe/1rf6iw.png">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <p id="prologueText"></p>
        </div>

        <button onclick="nextPrologue()" class="next-btn">
            Continue
        </button>

    </div>
</div>

<!-- SCORY INTRO -->
<div id="scoryIntro" class="screen hidden">
    <div class="dialogue-container">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <p id="scoryText"></p>
        </div>

        <button onclick="nextScory()" class="next-btn">
            Continue
        </button>

    </div>
</div>

<!-- PHASE 1 -->
<div id="phase1" class="screen hidden">
    <div class="dialogue-container">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <p id="phase1Text"></p>
        </div>

        <button onclick="answerPhase1_q1(0)">Silence</button>
        <button onclick="answerPhase1_q1(1)">Thoughts</button>
        <button onclick="answerPhase1_q1(2)">Someone else</button>

        <br><br>

        <button onclick="answerPhase1_q2(0)">Yes</button>
        <button onclick="answerPhase1_q2(1)">No</button>
        <button onclick="answerPhase1_q2(2)">I'm not sure</button>

    </div>
</div>

<!-- PHASE 2 -->
<div id="phase2" class="screen hidden">
    <div class="dialogue-container">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <p id="phase2Text"></p>
        </div>

        <button onclick="answerPhase2_q1(0)">Memory</button>
        <button onclick="answerPhase2_q1(1)">Feeling</button>
        <button onclick="answerPhase2_q1(2)">Something else</button>

        <br><br>

        <button onclick="answerPhase2_q2(0)">Yes</button>
        <button onclick="answerPhase2_q2(1)">No</button>
        <button onclick="answerPhase2_q2(2)">I don't know</button>

    </div>
</div>

<!-- PHASE 3 -->
<div id="phase3" class="screen hidden">
    <div class="dialogue-container">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <p id="phase3Text"></p>
        </div>

    </div>
</div>

<!-- PHASE 4 -->
<div id="phase4" class="screen hidden">
    <div class="dialogue-container">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <p id="phase4Text"></p>
        </div>

    </div>
</div>

<!-- ENDING -->
<div id="ending" class="screen hidden">
    <div class="dialogue-container">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <h2 id="endingTitle"></h2>
            <p id="endingText"></p>
        </div>

        <button onclick="showLetter()">View Letter</button>

    </div>
</div>

<!-- LETTER -->
<div id="letter" class="screen hidden">
    <div class="dialogue-container">

        <div class="speaker-box">Scory</div>

        <div class="text-box">
            <p id="letterText"></p>
        </div>

        <button onclick="showCredits()">End</button>

    </div>
</div>

<!-- CREDITS -->
<div id="credits" class="screen hidden">

    <h2>Credits</h2>

    <p>Scory — Attendant</p>
    <p>Nyra — Game Master</p>

    <br>

    <p>CheonsuMa</p>
    <p>Ashnyxion</p>
    <p>Yoon</p>
    <p>Xian</p>
    <p>Uris</p>
    <p>Derxged</p>
    <p>Clopeh</p>
    <p>Chi</p>
    <p>Maybal</p>
    <p>Mira</p>

    <br>

    <button onclick="restartGame()">Restart</button>

</div>

<script src="script.js"></script>

</body>
</html>
